
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YNY | Experience Designer</title>
    
    <!-- Amplitude SDK -->
    <script src="https://cdn.amplitude.com/script/9f72df885f746d3fd703c32740715a88.js"></script>
    <script>
      window.amplitude.add(window.sessionReplay.plugin({sampleRate: 1}));
      window.amplitude.init('9f72df885f746d3fd703c32740715a88', {
        "fetchRemoteConfig": true,
        "autocapture": {
          "attribution": true,
          "fileDownloads": true,
          "formInteractions": true,
          "pageViews": true,
          "sessions": true,
          "elementInteractions": true,
          "networkTracking": true,
          "webVitals": true,
          "frustrationInteractions": true
        }
      });
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'Helvetica';
            src: local('Helvetica'), local('Arial');
        }
        body {
            font-family: 'Helvetica', 'Arial', sans-serif;
            background-color: #000;
            color: #fff;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        .text-huge {
            font-size: clamp(4rem, 16vw, 15rem);
            line-height: 0.95; 
            letter-spacing: 0.01em;
            font-weight: 900;
            text-transform: uppercase;
        }
        .text-detail {
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 600;
        }
        .glass-nav {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        .project-thumbnail {
            transition: filter 0.5s ease, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            filter: grayscale(100%);
        }
        .project-card:hover .project-thumbnail {
            filter: grayscale(0%);
            transform: scale(1.03);
        }
        ::selection {
            background: #fff;
            color: #000;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Hero Interaction */
        .reveal-line {
            display: block;
            overflow: hidden;
        }
        .reveal-text {
            display: block;
            transform: translateY(110%);
            transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1), opacity 1.2s ease;
            opacity: 0;
        }
        .reveal-text.active {
            transform: translateY(0);
            opacity: 1;
        }
        .hero-hover-effect {
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease;
        }
        .hero-hover-effect:hover {
            transform: scale(0.98);
            opacity: 0.8;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.2",
    "vite": "https://esm.sh/vite@^7.3.1",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.12.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
    <!-- Vercel/Vite 배포를 위해 진입점 스크립트 추가 -->
    <script type="module" src="/index.tsx"></script>
</body>
</html>
